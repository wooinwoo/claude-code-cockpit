<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Forge Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;padding:20px}
h1{font-size:18px;color:#58a6ff;margin-bottom:16px}
.status{display:flex;gap:16px;margin-bottom:16px;padding:12px;background:#161b22;border-radius:8px;border:1px solid #30363d}
.status span{font-size:13px}.label{color:#8b949e}.val{color:#f0f6fc;font-weight:600}
.phase{color:#3fb950;font-size:14px;font-weight:700;text-transform:uppercase}
.cost{color:#d29922}.files{color:#58a6ff}
.log{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;max-height:70vh;overflow-y:auto;font-size:12px;font-family:'Cascadia Code','Fira Code',monospace;line-height:1.8}
.log div{border-bottom:1px solid #21262d;padding:2px 0}
.r-system{color:#8b949e}.r-builder{color:#3fb950}.r-attacker{color:#d29922}
.r-verify{color:#58a6ff}.time{color:#6e7681;margin-right:8px}
.bar{display:flex;gap:4px;margin-bottom:16px}
.bar div{flex:1;height:6px;border-radius:3px;background:#21262d}
.bar .done{background:#3fb950}.bar .active{background:#58a6ff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style></head><body>
<h1>⚒️ Forge Monitor</h1>
<div class="bar" id="pbar"></div>
<div class="status" id="info"></div>
<div class="log" id="log"></div>
<script>
const TASK='forge-mmzuvv8n';
const API='';
const phases=['design','scaffold','building','integrating','verifying','fixing'];
async function poll(){
  try{
    const r=await fetch(API+'/api/forge/runs/'+TASK);
    const d=await r.json();
    const dur=Math.round((Date.now()-d.startedAt)/1000);
    const min=Math.floor(dur/60),sec=dur%60;
    document.getElementById('info').innerHTML=`
      <span class="phase">${d.phase||'—'}</span>
      <span><span class="label">Status</span> <span class="val">${d.status}</span></span>
      <span class="files"><span class="label">Files</span> <span class="val">${d.finalFiles.length}</span></span>
      <span class="cost"><span class="label">Cost</span> <span class="val">$${d.cost.total.toFixed(3)}</span></span>
      <span><span class="label">Time</span> <span class="val">${min}m ${sec}s</span></span>
      <span><span class="label">Verify</span> <span class="val">${d.verifyCycles}</span></span>
    `;
    const ci=phases.indexOf(d.phase);
    document.getElementById('pbar').innerHTML=phases.map((p,i)=>
      `<div class="${i<ci?'done':i===ci?'active':''}" title="${p}"></div>`
    ).join('');
    const logEl=document.getElementById('log');
    const wasBottom=logEl.scrollHeight-logEl.scrollTop-logEl.clientHeight<50;
    logEl.innerHTML=d.log.map(l=>{
      const role=l.role.includes('verify')?'verify':l.role;
      return `<div class="r-${role}"><span class="time">${l.ts.slice(11,19)}</span>[${l.role}] ${l.message.slice(0,200)}</div>`;
    }).join('');
    if(wasBottom)logEl.scrollTop=logEl.scrollHeight;
    if(['done','failed','stopped','cost_exceeded'].includes(d.status)){
      document.title='✅ Forge Done';
    }else{
      document.title='⚒️ '+d.phase+' f:'+d.finalFiles.length;
    }
  }catch(e){document.getElementById('info').innerHTML='<span style="color:#f85149">Connection error</span>'}
}
setInterval(poll,3000);poll();
</script></body></html>
